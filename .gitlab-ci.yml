# Shell Executor di Windows (PowerShell)
# Runner: #38 (bQU_rLou) — tag: notifikasi-kepegawaian-pusdatin
# PHP, Composer, Node.js sudah terinstall di mesin runner

stages:
  - build
  - test
  - deploy

# Fix Windows MAX_PATH (260 char) limit
before_script:
  - git config --global core.longpaths true
  - git config core.longpaths true

# ─────────────────────────────────────────
# STAGE: BUILD
# ─────────────────────────────────────────
build-job:
  stage: build
  tags:
    - notifikasi-kepegawaian-pusdatin
  script:
    - echo "=== Memulai proses Build untuk Laravel ==="
    - echo "PHP version:" ; php --version
    - echo "Composer version:" ; composer --version
    - echo "Node version:" ; node --version
    - echo "NPM version:" ; npm --version
    - echo "--- Install PHP dependencies ---"
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
    - echo "--- Install Node dependencies ---"
    - npm install
    - echo "--- Build assets (Vite) ---"
    - npm run build
    - echo "--- Setup .env ---"
    - Copy-Item .env.example .env
    - php artisan key:generate
    - echo "=== Build selesai! ==="
  artifacts:
    expire_in: 1 hour
    paths:
      - public/build/
      - .env
      - vendor/

# ─────────────────────────────────────────
# STAGE: TEST
# ─────────────────────────────────────────
unit-test-job:
  stage: test
  tags:
    - notifikasi-kepegawaian-pusdatin
  dependencies:
    - build-job
  script:
    - echo "=== Menjalankan PHPUnit Test ==="
    - Copy-Item .env.example .env
    - php artisan key:generate
    - New-Item -ItemType File -Force -Path database/database.sqlite
    - $env:DB_CONNECTION = "sqlite"
    - $env:DB_DATABASE = "database/database.sqlite"
    - php artisan migrate --force
    - php artisan test

lint-test-job:
  stage: test
  tags:
    - notifikasi-kepegawaian-pusdatin
  dependencies:
    - build-job
  script:
    - echo "=== Menjalankan Laravel Pint ==="
    - ./vendor/bin/pint --test

# ─────────────────────────────────────────
# STAGE: DEPLOY
# ─────────────────────────────────────────
deploy-job:
  stage: deploy
  tags:
    - notifikasi-kepegawaian-pusdatin
  environment: production
  only:
    - main
  script:
    - echo "=== Deployment ==="
    - echo "Aplikasi siap untuk di-deploy ke server."
    - echo "Deployment selesai."