# Docker executor — menggunakan image PHP resmi dengan Composer & Node.js
# PHP 8.2, Composer 2.x, Node.js 20.x tersedia di image ini

image: php:8.2-cli

stages:
  - build
  - test
  - deploy

# Install dependencies sistem + Composer + Node.js sebelum setiap job
before_script:
  # Install ekstensi PHP yang dibutuhkan Laravel
  - apt-get update -qq && apt-get install -y -qq git curl zip unzip libzip-dev libpng-dev libonig-dev libxml2-dev
  - docker-php-ext-install pdo pdo_mysql mbstring exif pcntl bcmath gd zip
  # Install Composer
  - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  # Install Node.js 20.x + npm
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs
  # Verifikasi versi
  - php --version
  - composer --version
  - node --version
  - npm --version

# ─────────────────────────────────────────
# STAGE: BUILD
# ─────────────────────────────────────────
build-job:
  stage: build
  script:
    - echo "=== Memulai proses Build untuk Laravel ==="
    - echo "--- Install PHP dependencies ---"
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
    - echo "--- Install Node dependencies ---"
    - npm install
    - echo "--- Build assets (Vite) ---"
    - npm run build
    - echo "--- Setup .env ---"
    - cp .env.example .env
    - php artisan key:generate
    - echo "=== Build selesai! ==="
  artifacts:
    expire_in: 1 hour
    paths:
      - public/build/
      - .env
      - vendor/

# ─────────────────────────────────────────
# STAGE: TEST
# ─────────────────────────────────────────
unit-test-job:
  stage: test
  dependencies:
    - build-job
  script:
    - echo "=== Menjalankan PHPUnit Test ==="
    - cp .env.example .env
    - php artisan key:generate
    - touch database/database.sqlite
    - export DB_CONNECTION=sqlite
    - export DB_DATABASE=database/database.sqlite
    - php artisan migrate --force
    - php artisan test

lint-test-job:
  stage: test
  dependencies:
    - build-job
  script:
    - echo "=== Menjalankan Laravel Pint ==="
    - ./vendor/bin/pint --test

# ─────────────────────────────────────────
# STAGE: DEPLOY
# ─────────────────────────────────────────
deploy-job:
  stage: deploy
  environment: production
  only:
    - main
  script:
    - echo "=== Deployment ==="
    - echo "Aplikasi siap untuk di-deploy ke server."
    - echo "Deployment selesai."
