# Docker Executor — Runner #38 (bQU_rLou)
# Menggunakan php:8.2-cli sebagai base image
# Extensions diinstall via install-php-extensions (pre-compiled, jauh lebih cepat dari docker-php-ext-install)

image: php:8.2-cli

stages:
  - build
  - test
  - deploy

variables:
  DEBIAN_FRONTEND: noninteractive  # Cegah apt-get stuck dialog interaktif

# ─────────────────────────────────────────
# GLOBAL SETUP: PHP + Composer
# ─────────────────────────────────────────
before_script:
  - apt-get update -qq
  - apt-get install -y -qq --no-install-recommends curl git unzip zip libpng-dev libonig-dev
  # Install PHP extensions via tool pre-compiled (LEBIH CEPAT dari docker-php-ext-install)
  - curl -sSL https://github.com/mlocati/docker-php-extension-installer/releases/latest/download/install-php-extensions -o /usr/local/bin/install-php-extensions
  - chmod +x /usr/local/bin/install-php-extensions
  - install-php-extensions pdo_mysql mbstring exif pcntl bcmath gd zip intl sqlite3
  # Install Composer
  - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  - php --version
  - composer --version

# ─────────────────────────────────────────
# STAGE: BUILD (PHP + Composer + Node.js)
# ─────────────────────────────────────────
build-job:
  stage: build
  tags:
    - notifikasi-kepegawaian-pusdatin
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends curl git unzip zip libpng-dev libonig-dev
    - curl -sSL https://github.com/mlocati/docker-php-extension-installer/releases/latest/download/install-php-extensions -o /usr/local/bin/install-php-extensions
    - chmod +x /usr/local/bin/install-php-extensions
    - install-php-extensions pdo_mysql mbstring exif pcntl bcmath gd zip intl sqlite3
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    # Install Node.js 20.x (hanya dibutuhkan di build-job untuk Vite)
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y --no-install-recommends nodejs
    - php --version && composer --version && node --version && npm --version
  script:
    - echo "=== Install PHP dependencies ==="
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
    - echo "=== Install Node dependencies ==="
    - npm install
    - echo "=== Build assets (Vite) ==="
    - npm run build
    - echo "=== Setup .env ==="
    - cp .env.example .env
    - php artisan key:generate
    - echo "=== Build selesai! ==="
  artifacts:
    expire_in: 1 hour
    paths:
      - public/build/
      - .env
      - vendor/

# ─────────────────────────────────────────
# STAGE: TEST
# ─────────────────────────────────────────
unit-test-job:
  stage: test
  tags:
    - notifikasi-kepegawaian-pusdatin
  dependencies:
    - build-job
  script:
    - echo "=== Menjalankan PHPUnit Test ==="
    - cp .env.example .env
    - php artisan key:generate
    - touch database/database.sqlite
    - export DB_CONNECTION=sqlite
    - export DB_DATABASE=database/database.sqlite
    - php artisan migrate --force
    - php artisan test

lint-test-job:
  stage: test
  tags:
    - notifikasi-kepegawaian-pusdatin
  dependencies:
    - build-job
  script:
    - echo "=== Menjalankan Laravel Pint ==="
    - ./vendor/bin/pint --test

# ─────────────────────────────────────────
# STAGE: DEPLOY
# ─────────────────────────────────────────
deploy-job:
  stage: deploy
  tags:
    - notifikasi-kepegawaian-pusdatin
  environment: production
  only:
    - main
  script:
    - echo "=== Deployment ==="
    - echo "Aplikasi siap untuk di-deploy ke server."
    - echo "Deployment selesai."