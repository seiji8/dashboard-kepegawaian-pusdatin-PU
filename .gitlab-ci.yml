image: lorisleiva/laravel-docker:8.2

stages:
  - build
  - test
  - deploy

# Cache dependencies antar pipeline agar tidak download ulang
# vendor & node_modules disimpan di cache, BUKAN artifacts
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vendor/
    - node_modules/

build-job:
  stage: build
  script:
    - echo "Memulai proses Build untuk Laravel..."
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
    - npm install
    - npm run build
    - cp .env.example .env
    - php artisan key:generate
  # Artifacts hanya menyimpan hasil compile (ringan), BUKAN vendor/node_modules
  artifacts:
    expire_in: 1 hour
    paths:
      - public/build/
      - .env

unit-test-job:
  stage: test
  # Tidak pakai dependencies dari build-job, install sendiri dari cache
  dependencies: []
  script:
    - echo "Menjalankan PHPUnit Test..."
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
    - touch database/database.sqlite
    - php artisan migrate --force
    - php artisan test

lint-test-job:
  stage: test
  # Tidak pakai dependencies dari build-job, install sendiri dari cache
  dependencies: []
  script:
    - echo "Menjalankan Laravel Pint untuk mengecek kerapian kode..."
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
    - ./vendor/bin/pint --test

deploy-job:
  stage: deploy
  environment: production
  only:
    - main # Hanya akan berjalan jika ada push/merge ke branch main
  script:
    - echo "Aplikasi siap untuk di-deploy ke server."
    - echo "(Disini kamu bisa menambahkan script SSH, rsync, atau Git Pull ke server production/Pusdatin)"
    - echo "Deployment selesai."
