# Runner: shell executor di Windows (image: diabaikan untuk shell executor)
# PHP 8.5, Composer 2.x, Node 24.x, NPM 11.x tersedia di runner

stages:
  - build
  - test
  - deploy

# Fix Windows MAX_PATH (260 char) limit - wajib untuk vendor/phpunit path panjang
before_script:
  - git config --global core.longpaths true
  - git config core.longpaths true

# Cache dependencies antar pipeline agar tidak download ulang
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vendor/
    - node_modules/

build-job:
  stage: build
  script:
    - echo "=== Memulai proses Build untuk Laravel ==="
    - echo "PHP version:" && php --version
    - echo "Composer version:" && composer --version
    - echo "Node version:" && node --version
    - echo "NPM version:" && npm --version
    - echo "--- Install PHP dependencies ---"
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
    - echo "--- Install Node dependencies ---"
    - npm install
    - echo "--- Build assets (Vite) ---"
    - npm run build
    - echo "--- Setup .env ---"
    - Copy-Item .env.example .env
    - php artisan key:generate
    - echo "=== Build selesai! ==="
  # Artifacts hanya menyimpan hasil compile (ringan)
  artifacts:
    expire_in: 1 hour
    paths:
      - public/build/
      - .env

unit-test-job:
  stage: test
  dependencies: []
  script:
    - echo "=== Menjalankan PHPUnit Test ==="
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
    - Copy-Item .env.example .env
    - php artisan key:generate
    # Gunakan MySQL (XAMPP) karena migrations pakai MODIFY COLUMN (tidak support SQLite)
    - $mysqlExe = "C:\xampp\mysql\bin\mysql.exe"
    - '& $mysqlExe -u root -e "DROP DATABASE IF EXISTS db_kepegawaian_ci; CREATE DATABASE db_kepegawaian_ci CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"'
    # Override DB config ke MySQL
    - (Get-Content .env) -replace 'DB_CONNECTION=sqlite', 'DB_CONNECTION=mysql' | Set-Content .env
    - Add-Content .env "`nDB_HOST=127.0.0.1`nDB_PORT=3306`nDB_DATABASE=db_kepegawaian_ci`nDB_USERNAME=root`nDB_PASSWORD="
    - php artisan migrate --force
    - php artisan test
    # Cleanup database CI setelah selesai
    - '& $mysqlExe -u root -e "DROP DATABASE IF EXISTS db_kepegawaian_ci;"'

lint-test-job:
  stage: test
  dependencies: []
  script:
    - echo "=== Menjalankan Laravel Pint ==="
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
    - ./vendor/bin/pint --test

deploy-job:
  stage: deploy
  environment: production
  only:
    - main
  script:
    - echo "=== Deployment ==="
    - echo "Aplikasi siap untuk di-deploy ke server."
    - echo "Deployment selesai."
